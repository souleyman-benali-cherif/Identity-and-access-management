name: iam_projectt
description: "University of Batna 2 — Identity & Access Management Suite"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Database (SQLite)
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0

  # Security
  bcrypt: ^1.1.3
  uuid: ^4.5.1
  otp: ^3.1.4
  crypto: ^3.0.6

  # Routing
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  intl: ^0.19.0
  http: ^1.2.2
  qr_flutter: ^4.1.0

  cupertino_icons: ^1.0.8
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
